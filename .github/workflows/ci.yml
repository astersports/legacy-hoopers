name: CI

# Runs the same gates we run locally — typecheck, tests, production build —
# on every PR to main and on pushes to main. A red check blocks the merge
# button so a type error, a broken test, or a broken build can't ride into
# main unnoticed. This is the "green CI" the repo workflow relies on.
#
# Package manager is pnpm (pnpm-lock.yaml; version pinned by package.json
# "packageManager"). There is no `lint` script in package.json, so the gate
# is: pnpm check (tsc --noEmit) -> pnpm test (vitest run) -> pnpm build
# (vite build + esbuild server bundle).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: check · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        # Version comes from package.json "packageManager".
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # Supply-chain faucet gate — mirrors astersports/aster-sports (Phase 0.0 /
  # PLAN_ON_TRUTH). Dependency changes that are EITHER a major-version bump OR
  # touch a money/child/auth-adjacent package (@supabase/*, cookie, jose, etc.)
  # must NOT auto-merge on green — they require a human owner, who releases the
  # PR with the `dep-review-approved` label. Minor/patch bumps to non-sensitive
  # deps pass and stay auto-mergeable. Gate by what the dependency TOUCHES, not
  # the version-jump size. PR-only. Needs no install.
  # NOTE (owner): to BLOCK merge, mark this a REQUIRED status check in branch
  # protection — the job alone only reports.
  dependency-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Resolve base + head package.json + lockfile (P1-A — scan the resolved tree)
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          LOCK=pnpm-lock.yaml
          git show "$BASE_SHA:package.json" > /tmp/base-package.json 2>/dev/null || echo '{}' > /tmp/base-package.json
          cp package.json /tmp/head-package.json
          git show "$BASE_SHA:$LOCK" > /tmp/base-lock 2>/dev/null || : > /tmp/base-lock
          cp "$LOCK" /tmp/head-lock 2>/dev/null || : > /tmp/head-lock
      - name: Gate major / money-child-auth dependency changes (resolved tree)
        env:
          BASE_PKG: /tmp/base-package.json
          HEAD_PKG: /tmp/head-package.json
          BASE_LOCK: /tmp/base-lock
          HEAD_LOCK: /tmp/head-lock
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: node scripts/dependency-gate.mjs
